<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jon Daniel — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page">

        <!-- Sidebar nav -->
        <nav class="sidenav">
            <a class="sidenav-link active" href="#">Clients</a>
            <a class="sidenav-link" href="#">Research</a>
            <a class="sidenav-link" href="#">Portfolio</a>
            <a class="sidenav-link" href="#">Podcast</a>
        </nav>

        <!-- Main -->
        <div class="main">

            <!-- Grid -->
            <div class="grid">

                <!-- HERO CARD -->
                <div class="card hero-card">
                    <div class="hero-about">
                        <img style="width: 30px; transform: skew(20deg);" src="./icons/Shine.png" alt="">
                        <p style="transform: skew(20deg);">About Me</p>
                    </div>

                    <div class="hero-photo-wrap d-flex">
                        <div class="hero-photo-wrap-inner">
                            <img class="hero-img" src="./images/Logo.png" alt="Jon Daniel" />
                        </div>
                    </div>

                    <div class="hero-name">
                        <span style="font-weight: 100;">Im,</span>
                        <span>Jon</span>
                        <span>Daniel</span>
                    </div>

                    <div class="hero-badge">
                        <img src="./images/Circle img.png" alt="2022 Design Portfolio badge" />
                    </div>

                    <a class="hero-email" href="mailto:inquiry@jondaniel.design">
                        inquiry@jondaniel.design
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <path d="m2 7 10 7 10-7" />
                        </svg>
                    </a>
                    <hr class="dotted-line">
                </div>

                <!-- Top bar -->
                <div class="title-card">
                    <h1 class="portfolio-title">Portfolio</h1>
                </div>

                <!-- VIDEO CARD -->
                <div class="card video-card">
                    <img src="./images/flamingo.jpg" alt="Featured project thumbnail" />
                    <button class="play-btn" aria-label="Play video">
                        <svg viewBox="0 0 24 24">
                            <polygon points="5,3 19,12 5,21" />
                        </svg>
                    </button>
                </div>

                <!-- STATS COLUMN -->
                <div class="stats-col">
                    <div class="stat-card projects">
                        <div class="stat-number">251</div>
                        <div class="stat-label">Projects</div>
                    </div>
                    <div class="stat-card awards">
                        <div class="stat-number" style="color: #fff;">156</div>
                        <div class="stat-label" style="color: #fff;">Awards</div>
                    </div>
                </div>

                <!-- BOTTOM ROW -->
                <div class="bottom-row">

                    <!-- Clients / Apple card -->
                    <div class="clients-card">
                        <img src="./icons/Apple.png" alt="">
                        <span class="clients-label">Clients</span>
                    </div>

                    <div class="globe-card">
                        <img src="./images/Orb.png" alt="Decorative orb" />
                    </div>

                    <!-- 172 Award card -->
                    <div class="award-card">
                        <div class="award-number">172</div>
                        <div class="award-label">Global Design<br>Awards.</div>
                    </div>

                </div><!-- /bottom-row -->

            </div><!-- /grid -->
        </div><!-- /main -->
    </div><!-- /page -->

</body>

</html>
