<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore Art Work</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Dots -->
    <div class="bg-dots">
        <span style="top:20px; left:15px;"></span>
        <span style="top:20px; right:15px;"></span>
        <span class="bottom-mid-dot" style="bottom:300px; left:15px;"></span>
        <span class="bottom-mid-dot" style="bottom:300px; right:15px;"></span>
        <span style="bottom:20px; left:15px;"></span>
        <span style="bottom:20px; right:15px;"></span>
    </div>

    <div class="page-wrapper">

        <!-- Header -->
        <div class="header-row">
            <span class="section-title">Explore Art Work</span>
            <a href="#" class="see-all-link">See All</a>
        </div>

        <!-- Card Grid -->
        <div class="art-grid">

            <!-- Card 1 – Monocular -->
            <div class="art-card">
                <div class="art-thumb">
                    <img src="./images/Monocular.png" alt="Monocular" />
                </div>
                <div class="art-meta">
                    <span class="art-title">Monocular</span>
                    <span class="art-likes">
                        54.8k
                        <svg class="heart-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                        </svg>
                    </span>
                </div>
                <a href="#" class="btn-bid">Place Bid</a>
            </div>

            <!-- Card 2 – Horns Mask -->
            <div class="art-card">
                <div class="art-thumb">
                    <img src="./images/Horns Mask.png" alt="Horns Mask" />

                    <span class="art-title">Horns Mask</span>
                    <span class="art-likes">
                        32.4k
                        <svg class="heart-icon" viewBox="0 0 24 24" aria-hidden="true">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />

                    <span class="art-likes">
                        88.6k

                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
